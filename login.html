<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>LexRadar · Acceso privado</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <div class="brand login-brand">
        <span class="brand-mark">LR</span>
        <span>
          <strong>LexRadar</strong>
          <small>Beta privada</small>
        </span>
      </div>

      <h2>Acceso privado</h2>
      <p>Acceso reservado a usuarios autorizados durante la fase beta.</p>

      <form id="loginForm" class="login-form">
        <label>Email
          <input id="loginEmail" type="email" autocomplete="username" required />
        </label>
        <label>Contraseña
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </label>
        <button class="primary-btn" type="submit">Acceder</button>
      </form>

      <div id="loginError" class="login-error" hidden></div>

      <p style="margin-top:18px;font-size:.75rem;color:#8d99a8;text-align:center;">
        Proyecto independiente de <strong>OpenTrust Group</strong>.
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
