<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#07111f" />
  <title>LexRadar · Beta privada </title>
  <meta name="description" content="LexRadar se encuentra actualmente en fase beta privada." />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    :root{
      --bg:#07111f;
      --card:#0d1b2f;
      --line:rgba(255,255,255,.10);
      --text:#e8f1fb;
      --muted:#8ea0b5;
      --brand:#38bdf8;
      --brand2:#22d3ee;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 10%,rgba(56,189,248,.16),transparent 28%),
        radial-gradient(circle at 80% 80%,rgba(34,211,238,.10),transparent 34%),
        var(--bg);
    }
    .wrap{
      width:min(92vw,460px);
      padding:34px;
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg,rgba(13,27,47,.96),rgba(7,17,31,.96));
      box-shadow:0 30px 80px rgba(0,0,0,.35);
      text-align:center;
    }
    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      margin-bottom:22px;
    }
    .mark{
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      border-radius:16px;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#04111f;
      font-weight:900;
      letter-spacing:-.04em;
    }
    h1{margin:0;font-size:2rem;letter-spacing:-.04em}
    .beta{
      display:inline-flex;
      margin:18px 0 10px;
      padding:6px 12px;
      border:1px solid rgba(56,189,248,.28);
      border-radius:999px;
      color:#b9ecff;
      background:rgba(56,189,248,.08);
      font-size:.82rem;
      font-weight:700;
    }
    p{margin:12px 0;color:var(--muted);line-height:1.6}
    .btn{
      display:inline-flex;
      justify-content:center;
      align-items:center;
      margin-top:22px;
      padding:12px 22px;
      border-radius:14px;
      color:#04111f;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      font-weight:800;
      text-decoration:none;
    }
    .foot{
      margin-top:24px;
      padding-top:18px;
      border-top:1px solid var(--line);
      font-size:.78rem;
      color:#7d8da1;
    }
    .foot strong{color:#cfe8f6}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand" aria-label="LexRadar">
      <div class="mark">LR</div>
      <h1>LexRadar</h1>
    </div>

    <div class="beta">Beta privada</div>

    <p>Acceso reservado a usuarios autorizados durante la fase beta.</p>

    <a class="btn" href="/app.html">Acceder</a>

    <div class="foot">
      Proyecto independiente de <strong>OpenTrust Group</strong>.
    </div>
  </main>
</body>
</html>
