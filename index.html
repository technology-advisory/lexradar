<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#07111f" />

  <title>LexRadar · Beta privada</title>
  <meta name="description" content="LexRadar se encuentra actualmente en fase beta privada. Acceso reservado a usuarios autorizados." />

  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <style>
    :root{
      --navy:#07111f;
      --navy-2:#0d1b2f;
      --text:#0b1f3a;
      --muted:#4e6077;
      --line:rgba(11,31,58,.12);
      --white:rgba(255,255,255,.72);
      --white-strong:rgba(255,255,255,.88);
      --blue:#173b73;
      --blue-2:#2563eb;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      min-height:100vh;
      color:var(--text);
      background:
        linear-gradient(rgba(255,255,255,.42), rgba(255,255,255,.54)),
        url("img/image-front.jpg") center/cover no-repeat fixed;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 18px;
    }

    .page{
      width:min(100%,920px);
      text-align:center;
      animation:fadeUp .55s ease both;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:16px;
      margin-bottom:10px;
    }

    .brand-mark{
      width:62px;
      height:62px;
      display:grid;
      place-items:center;
      border-radius:20px;
      background:rgba(255,255,255,.48);
      border:1px solid rgba(11,31,58,.18);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:0 20px 55px rgba(11,31,58,.10);
    }

    .brand-mark svg{
      width:38px;
      height:38px;
      stroke:#10284c;
    }

    .brand-name{
      font-size:clamp(2.6rem,7vw,5rem);
      line-height:.95;
      margin:0;
      letter-spacing:-.065em;
      color:#10284c;
      font-weight:900;
      text-shadow:0 12px 38px rgba(255,255,255,.52);
    }

    .brand-sub{
      margin:10px 0 34px;
      color:#30445f;
      font-size:clamp(.9rem,2vw,1.18rem);
      letter-spacing:.36em;
      text-transform:uppercase;
      font-weight:650;
    }

    .hero-card{
      margin:0 auto;
      width:min(100%,720px);
      padding:34px 34px 28px;
      border:1px solid rgba(255,255,255,.42);
      border-radius:34px;
      background:linear-gradient(180deg,rgba(255,255,255,.70),rgba(255,255,255,.50));
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:0 32px 90px rgba(11,31,58,.16);
    }

    .beta{
      margin:0;
      font-size:clamp(2.5rem,7vw,5rem);
      line-height:1;
      letter-spacing:-.06em;
      color:#10284c;
      font-weight:900;
    }

    .lead{
      margin:22px auto 0;
      max-width:640px;
      color:#344b68;
      font-size:clamp(1.05rem,2.2vw,1.35rem);
      line-height:1.55;
      font-weight:500;
    }

    .features{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      margin:30px auto 0;
      width:min(100%,720px);
    }

    .feature{
      display:flex;
      align-items:flex-start;
      gap:14px;
      text-align:left;
      padding:22px 20px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.48);
      background:rgba(255,255,255,.64);
      box-shadow:0 18px 45px rgba(11,31,58,.10);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .feature-icon{
      width:44px;
      height:44px;
      flex:0 0 44px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:rgba(37,99,235,.10);
      color:#173b73;
    }

    .feature-icon svg{
      width:23px;
      height:23px;
      stroke:currentColor;
    }

    .feature strong{
      display:block;
      margin:0 0 7px;
      color:#10284c;
      font-size:1rem;
    }

    .feature span{
      display:block;
      color:#53667d;
      font-size:.92rem;
      line-height:1.45;
    }

    .actions{
      margin:34px 0 0;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-width:280px;
      padding:17px 26px;
      border-radius:18px;
      color:#fff;
      background:linear-gradient(135deg,#10284c,#173b73);
      box-shadow:0 22px 55px rgba(16,40,76,.28);
      text-decoration:none;
      font-size:1.08rem;
      font-weight:850;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 28px 70px rgba(16,40,76,.36);
    }

    .btn svg{
      width:20px;
      height:20px;
    }

    .footer{
      margin-top:28px;
      color:rgba(255,255,255,.88);
      font-size:.95rem;
      text-shadow:0 2px 12px rgba(0,0,0,.28);
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(14px);filter:blur(8px)}
      to{opacity:1;transform:translateY(0);filter:blur(0)}
    }

    @media (max-width:760px){
      body{background-attachment:scroll;padding:24px 14px}
      .hero-card{padding:28px 20px 24px;border-radius:28px}
      .features{grid-template-columns:1fr}
      .feature{padding:18px}
      .btn{width:100%;min-width:0}
      .brand{gap:12px}
      .brand-mark{width:52px;height:52px;border-radius:17px}
      .brand-sub{letter-spacing:.22em}
    }
  </style>
</head>

<body>
  <main class="page">
    <section aria-labelledby="lexradar-title">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="32" cy="32" r="23"></circle>
            <circle cx="32" cy="32" r="13"></circle>
            <circle cx="32" cy="32" r="4"></circle>
            <path d="M32 9v7M32 48v7M9 32h7M48 32h7"></path>
            <path d="M43 21l8-8"></path>
          </svg>
        </div>
        <h1 id="lexradar-title" class="brand-name">LexRadar</h1>
      </div>

      <div class="brand-sub">Radar de conocimiento jurídico</div>

      <div class="hero-card">
        <h2 class="beta">Beta privada</h2>
        <p class="lead">
          Acceso reservado a usuarios autorizados durante la fase beta.
        </p>
      </div>

      
      <div class="actions">
        <a class="btn" href="/app.html" aria-label="Acceder a la beta de LexRadar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
            <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
          </svg>
          Acceder a la beta
        </a>
      </div>

      <footer class="footer">
        LexRadar © 2026 · OpenTrust Group
      </footer>
    </section>
  </main>
</body>
</html>
